<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{margin:0;padding:0;box-sizing: border-box;font-family: 'Courier New', Courier, monospace;}
        .wrapper{
            height: 100vh;
            display: grid;
            color:#fff;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-rows: 0.4fr 1.5fr 1.3fr 0.8fr;
            grid-template-areas: "navbar navbar navbar navbar"
                                "sidebar main main main"
                                "sidebar box1 box2 box3"
                                "sidebar footer footer footer";
                                grid-gap: 0.2rem;
                                text-align: center;
        }

        .navbar{
                background: rgb(20, 96, 210);
                grid-area: navbar;
        }
        .sidebar{
                background: rgb(44, 190, 147);
                grid-area: sidebar;
        }
        .main{
            background: rgb(128, 240, 49);
            grid-area: main;
        }
        .box1{background: rgb(210, 20, 26);grid-area: box1;}
        .box2{background: rgb(210, 99, 20);grid-area: box2;}
        .box3{background: rgb(164, 197, 92);grid-area: box3;}
        .footer{background: rgb(125, 20, 210);grid-area: footer;}

        @media only screen and (max-width:600px){
            .wrapper{
                grid-template-columns: 1fr;
                grid-template-rows: 0.2fr 2fr 0.2fr 1.2fr 1.2fr 1.2fr 1fr;
                grid-template-areas: "navbar" "main" "sidebar" "box1" "box2" "box3" "footer";
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="navbar">Navigation</div>
        
        <div class="main">Main</div>
        <div class="sidebar">Sidebar</div>
        <div class="box1">Box 1</div>
        <div class="box2">Box 2</div>
        <div class="box3">Box 3</div>
        <div class="footer">Footer</div>
    </div>
</body>
</html>
